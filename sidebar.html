<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins, sans-serif;
        }
        .sidebar-icon {
            width: 22px;
            height: 22px;
            flex-shrink:0;
        }
         body {
            background:#F8FAFC;
        }
        nav {
            width:240px;
            height:100vh;
            background:#1E293B;
            color:white;
            padding:25px 18px;
        }
        nav h2{
            text-align:center;
            margin-bottom:35px;
            font-size:28px;
        }
        nav ul{
            list-style:none;
        }
        nav ul li{

            display:flex;
            align-items:center;
            gap:15px;

            padding:14px 16px;
            margin-bottom:6px;

            border-radius:10px;

            cursor:pointer;

            transition:.3s;
        }
        nav ul li:hover{

            background:#334155;

        }
        span{

            font-size:16px;
            font-weight:500;

        }

    </style>
    
</head>
<body>
    <!-- Sidebar -->
    <nav>
        <h2>Study Planner</h2>
        <ul> 
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-icon"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>Dashboard</span>
            </li>
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-icon"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M6.38 18.7 4 21"/><path d="M17.64 18.67 20 21"/></svg>
                <span>Daily Routine</span>
            </li>
            <li>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-icon"><path d="M12 16v5"/><path d="M16 14.639V21"/><path d="M20 10.656V21"/><path d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15"/><path d="M4 18.463V21"/><path d="M8 14.656V21"/></svg>
