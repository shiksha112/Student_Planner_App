<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Important Dates</title>

    <link rel="stylesheet" href="dates.css">

</head>


<body>


<div class="dates-container">



    <!-- Header Section -->

    <header class="dates-header">


        <div class="calendar-icon">

            📅

        </div>



        <div class="header-content">


            <p class="month">
                July 2026
            </p>


            <h1>
                Important Dates
            </h1>


            <p>
                Stay ahead of your deadlines ✨
            </p>


        </div>


    </header>





    <!-- Next Deadline Section -->


    <section class="deadline-card">


        <div class="deadline-info">


            <p>
                🔔 Next Deadline
            </p>


            <h3>
                DSA Test
            </h3>


            <span>
                20 July 2026
            </span>


        </div>




        <div class="countdown">


            <h2>
                05
            </h2>


            <p>
                Days Left
            </p>


        </div>


    </section>





    <!-- Add Date Button -->


    <section class="add-date-section">


        <button class="add-date-btn">


            <span>
                +
            </span>


            Add Date


        </button>


    </section>





    <!-- Dates List -->


    <section class="dates-section">



        <!-- High Priority -->


        <div class="date-card high">


            <div class="priority-line"></div>


            <div class="date-details">


                <h3>
                    DSA Test
                </h3>


                <p>
                    20 July 2026
                </p>


                <span>
                    High Priority
                </span>


            </div>


        </div>





        <!-- Medium Priority -->


        <div class="date-card medium">


            <div class="priority-line"></div>


            <div class="date-details">


                <h3>
                    Maths Quiz
                </h3>


                <p>
                    25 July 2026
                </p>


                <span>
                    Medium Priority
                </span>


            </div>


        </div>





        <!-- Low Priority -->


        <div class="date-card low">


            <div class="priority-line"></div>


            <div class="date-details">


                <h3>
                    Project Submission
                </h3>


                <p>
                    30 July 2026
                </p>


                <span>
                    Low Priority
                </span>


            </div>


        </div>



    </section>





    <!-- View All Button -->


    <button class="view-all-btn">

        View All Dates →

    </button>



</div>



</body>


</html>
