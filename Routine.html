<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Georgia, serif;
        color: navy;
    }

    body{
        background-color: rgb(243,249,253);
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    /* Main Container */
    .outer{
        width: 95%;
        max-width: 550px;
        min-height: 90vh;
    
        border: 2px dashed purple;
        border-radius: 12px;
        box-shadow: 2px 5px 15px purple;

        padding: 25px;
        background: white;
    }

    /* Header */
    .routine-header{
        margin-bottom: 30px;
    }

    .top-section{
        width: 100%;
        border: 2px solid rgb(15,163,249);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 2px 5px 15px rgba(0,0,255,0.4);
    }

    .top-section h2{
        font-size: 1.5rem;
    }

    /* Main */
    .add-task{
        width: 100%;
    }

    button{
        display: flex;
        align-items: center;
        gap: 8px;

        background: #fce665;
        border: none;
        border-radius: 10px;

        padding: 10px 18px;
        cursor: pointer;

        font-size: 1rem;
    }

    button:hover{
        box-shadow: 2px 5px 10px #f4f806cc;
    }

    #add-btn{
        color: navy;
    }

    /* Task Card */
    .new-task{
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;

        margin-top: 20px;
        padding: 15px;

        border: 2px double magenta;
        border-radius: 10px;
        box-shadow: 2px 5px 15px pink;
    }

    .task-added{
        width: 18px;
        height: 18px;
    }

    .task-added:checked + label{
        text-decoration: line-through;
        font-weight: bold;
        color: gray;
    }

    .new-task label{
        font-size: 1rem;
    }

    /* Footer */
    .progress-tracker{
        margin-top: 40px;
    }

    #tracker{
        width: 100%;

         border: 2px double rgb(3,95,63);
        border-radius: 10px;
        box-shadow: 2px 5px 15px rgb(5,244,188);

        padding: 20px;
    }

    #tracker h3{
        margin-bottom: 15px;
    }

    /* ---------- Responsive ---------- */

    @media (max-width:768px){

        .outer{
            width: 100%;
            padding: 20px;
        }

        .top-section h2{
            font-size: 1.3rem;
        }

        button{
            width: 100%;
            justify-content: center;
        }
    }

    @media (max-width:480px){

        .outer{
            padding: 15px;
        }

        .top-section h2{
            font-size: 1.1rem;
        }

        .new-task{
            padding: 12px;
        }

        .new-task label{
            font-size: 0.9rem;
        }

        button{
            font-size: 0.9rem;
        }

        #tracker h3{
            font-size: 0.95rem;
        }
    }
        
    </style>
</head>
<body>
    <div class="outer">
    <header class="routine-header">
        <div class="top-section">
            <h2><span class="diamond">&diams;</span> Today's Routine</h2>
        </div>
    </header>
    <main>
        <!-- Add new task -->
        <section class="add-task"> 
            <button id="add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                <label for="add-btn">Add New Task</label>
            </button>
            <!-- before adding js after js remove it -->
            <div class="new-task">
                <input type="checkbox" class="task-added">
                <label>Wake Up - 6:00 AM</label>
            </div>
            <div class="new-task">
                <input type="checkbox" class="task-added">
                <label>Study - 11:00 AM</label>
            </div>
            <div class="new-task">
                <input type="checkbox" class="task-added">
                <label>sleep - 10:00 PM</label>
            </div>
        </section>
        
    </main>
    <footer class="progress-tracker">
        <div id="tracker">
        <h3>Completed : 0/0 tasks</h3>
        <h3>Progress :0%</h3>
        </div>
    </footer>
    </div>
</body>
</html>
