<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    
</head>
<body>
    <header>
        <h1>Daily Routine</h1>
    </header>
    <main>
        <!-- Add new task -->
        <section class="add-task">
            <h2>Today's Routine</h2>
            <button>
                <img src="plus.webp" alt="plus icon" width="10" height="10">
                Add New Task
            </button>
            <!-- before adding js after js remove it -->
            <div class="new-task">
                <input type="checkbox">
                <label>Wake Up - 6:00 AM</label>
            </div>
            <div class="new task">
                <input type="checkbox">
                <label>Study - 11:00 AM</label>
            </div>
            <div class="new task">
                <input type="checkbox">
                <label>sleep - 10:00 PM</label>
            </div>
        </section>
        
    </main>
    <footer>
        <h3>Completed : 0/0 tasks</h3>
        <h3>Progress :0%</h3>
    </footer>
    
</body>
</html>
