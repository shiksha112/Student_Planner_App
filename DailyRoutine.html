<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    
</head>
<body>
    <header>
        <h2>Today's Routine</h2>
    </header>
    <main>
        <!-- Add new task -->
        <section class="add-task">
            <button>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="plus-icon"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                Add New Task
            </button>
            <!-- before adding js after js remove it -->
            <div class="new-task">
                <input type="checkbox">
                <label>Wake Up - 6:00 AM</label>
            </div>
            <div class="new task">
                <input type="checkbox">
                <label>Study - 11:00 AM</label>
            </div>
            <div class="new task">
                <input type="checkbox">
                <label>sleep - 10:00 PM</label>
            </div>
        </section>
        
    </main>
    <footer>
        <h3>Completed : 0/0 tasks</h3>
        <h3>Progress :0%</h3>
    </footer>
    
</body>
</html>
