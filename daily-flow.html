<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Flow</title>

    <link rel="stylesheet" href="daily-flow.css">

</head>


<body>

    <div class="daily-container">


        <!-- Header Section -->

        <header class="daily-header">

            <p class="date">
                Monday • 13 July
            </p>

            <h1>
                Daily Flow
            </h1>

            <p class="greeting">
                Good Morning, Shiksha 🌤
            </p>

        </header>



        <!-- Motivation Section -->

        <section class="motivation-card">

            <span>
                ✨
            </span>

            <p>
                Small consistent efforts create big results.
            </p>

        </section>




        <!-- Add Task Section -->

        <section class="add-task-section">

            <button class="add-task-btn" id="addTaskBtn">

                <span>
                    +
                </span>

                Add New Task

            </button>


        </section>

        <!-- Task List Section -->

        <section class="task-section" id="taskContainer">

        </section>

        <!-- Progress Section -->


        <section class="growth-section">


            <div class="growth-header">

                <h2>
                    Today's Growth 🌱
                </h2>


                <p id="taskStatus">
                    0 / 0 Tasks Completed
                </p>


            </div>



            <div class="progress-bar">

                <div class="progress-fill" id="progressFill"></div>

            </div>


            <p class="progress-text" id="progressText">
                0% Completed
            </p>


        </section>

        <!-- Add Task Modal -->

        <div class="modal-overlay" id="taskModal">

            <div class="modal">

                <h2>Add New Task</h2>

                <div class="input-group">

                    <label>Task Name</label>

                    <input
                        type="text"
                        id="taskNameInput"
                        placeholder="Enter task name"
                    >

                </div>

                <div class="input-group">

                    <label>Time</label>

                    <input
                        type="time"
                        id="taskTimeInput"
                    >

                </div>

                <div class="modal-buttons">

                    <button class="cancel-btn" id="cancelBtn">
                        Cancel
                    </button>

                    <button class="save-btn" id="saveTaskBtn">
                        Add Task
                    </button>

                </div>

            </div>

        </div>


    </div>

    
</body>

<script src="daily-flow.js"></script>

</html>
