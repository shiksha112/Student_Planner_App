<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daily Flow</title>

    <link rel="stylesheet" href="daily-flow.css">

</head>


<body>

    <div class="daily-container">


        <!-- Header Section -->

        <header class="daily-header">

            <p class="date">
                Monday • 13 July
            </p>

            <h1>
                Daily Flow
            </h1>

            <p class="greeting">
                Good Morning, Shiksha 🌤
            </p>

        </header>



        <!-- Motivation Section -->

        <section class="motivation-card">

            <span>
                ✨
            </span>

            <p>
                Small consistent efforts create big results.
            </p>

        </section>


        <!-- Add Task Section -->

        <section class="add-task-section">

            <button class="add-task-btn" id="addTaskBtn">

                <span>
                    +
                </span>

                Add New Task

            </button>


        </section>


        <!-- Task List Section -->

        <section class="task-section" id="taskContainer">

        </section>


        <!-- Progress Section -->


        <section class="growth-section">


            <div class="growth-header">

                <h2>
                    Today's Growth 🌱
                </h2>


                <p>
                    2 / 5 Tasks Completed
                </p>


            </div>



            <div class="progress-bar">

                <div class="progress-fill"></div>

            </div>


            <p class="progress-text">
                40% Completed
            </p>


        </section>




    </div>



</body>

</html>
